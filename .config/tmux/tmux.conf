set-option -sa terminal-overrides ",xterm*:Tc"
set -g default-terminal "screen-256color"

set -g base-index 1

# changing default prefix map
set -g prefix C-Space
unbind C-b
bind-key C-Space send-prefix

# shift alt vim keys to switch windows
bind -n M-H previous-window
bind -n M-L next-window

# changing splitting pane bindings vertically
unbind %
bind | split-window -h -c '#{pane_current_path}'

# changing splitting pane bindings horizontally
unbind '"'
bind - split-window -v -c '#{pane_current_path}'

# refreshing tmux configuration file
unbind r
bind r source-file ~/.tmux.conf

# resizing tmux pane
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5

# maximizing current pane
bind -r m resize-pane -Z

# enable mouse to resize pane
set -g mouse on

set-window-option -g mode-keys vi

bind-key -T copy-mode-vi 'v' send -X begin-selection
# clipboard
bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel "wl-copy" \; display-message "Copied to clipboard"
# bind-key -T copy-mode-vi 'y' send -X copy selection
unbind -T copy-mode-vi MouseDragEnd1Pane

# Configure the catppuccin plugin
# set -g @catppuccin_flavor "mocha"
# set -g @catppuccin_window_status_style "basic"
# set -g @catppuccin_window_default_text "#W"
# set -g @catppuccin_window_text "#W"
# set -g @catppuccin_window_current_text "#W"
# set -g @catppuccin_menu_selected_style "fg=#{@thm_fg}, bold ,bg=#{@thm_overlay_0}"

# Themepack
set -g @themepack 'powerline/block/yellow'

# tpm plugin
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'jimeh/tmux-themepack'
set -g @plugin 'tmux-plugins/tmux-resurrect' # persist tmux sessions after computer restarts
set -g @plugin 'tmux-plugins/tmux-continuum' # automatically saves sessions for every 15 minutes


# persisting tmux sessions across system restarts
set -g @resurrect-capture-pane-contents 'on'
# set -g @continuum-restore 'on'


# bindings
bind-key -r i run-shell "tmux neww ~/.dotfiles/scripts/cht.sh"
# manually restore the last saved session
bind r run-shell ~/.tmux/plugins/tmux-resurrect/scripts/restore.sh
bind -r D neww -c "#{pane_current_path}" "[[ -e TODO.md ]] && nvim TODO.md || nvim ~/dev/personal/todo.md"
bind -r N neww -c "~/dev/personal/notes" "nvim \"\$(date +'%m-%d-%Y')-notes.md\""
# bind -r N neww -c "~/dev/personal/notes" "nvim -c \"normal! ggO# \$(date +'%m-%d-%Y') Notes\" \"\$(date +'%m-%d-%Y')-notes.md\""

bind-key -r f run-shell "tmux neww ~/.local/bin/tmux-sessionizer"
bind-key -r P run-shell "tmux neww ~/.local/bin/tmux-sessionizer ~/dev/personal"
bind-key -r C run-shell "tmux neww ~/.local/bin/tmux-sessionizer ~/dev/dotfiles"
bind-key -r H run-shell "tmux neww ~/.local/bin/tmux-sessionizer ~/dev/dotfiles/.config/nvim"

# Initialize TMUX plugin manager (keep thsis line at the very bottom of tmux.conf)
# run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux
run ~/.tmux/plugins/tpm/tpm










